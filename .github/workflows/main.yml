name: LSPatch自动编译

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build_task:
    name: 编译环境-${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    env:
      CCACHE_COMPILERCHECK: '%compiler% -dumpmachine; %compiler% -dumpversion'
      CCACHE_NOHASHDIR: 'true'
      CCACHE_HARDLINK: 'true'
      CCACHE_BASEDIR: '${{ github.workspace }}'

    steps:
    - name: 拉取项目源码
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: 写入签名密钥
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
      run: |
        if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
          echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
          echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
          echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
          echo androidStoreFile='key.jks' >> gradle.properties
          echo ${{ secrets.KEY_STORE }} | base64 --decode > key.jks
        fi

    - name: 拉取libxposed-api依赖
      uses: actions/checkout@v4
      with:
        repository: libxposed/api
        path: libxposed/api
        fetch-depth: 0

    - name: 拉取libxposed-service依赖
      uses: actions/checkout@v4
      with:
        repository: libxposed/service
        path: libxposed/service
        fetch-depth: 0

    - name: 配置Java17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle缓存与环境配置
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-home-cache-cleanup: true

    - name: Ccache编译加速
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 2G
        key: ${{ runner.os }}
        restore-keys: ${{ runner.os }}
        save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

    - name: 发布libxposed-api到本地Maven
      working-directory: libxposed/api
      run: ./gradlew publishApiPublicationToMavenLocal --stacktrace

    # 修复点：使用完整无歧义任务名 publishServicePublicationToMavenLocal
    - name: 发布libxposed-service到本地Maven
      working-directory: libxposed/service
      run: ./gradlew publishServicePublicationToMavenLocal --stacktrace

    - name: 执行全量打包编译
      run: |
        echo 'org.gradle.parallel=true' >> gradle.properties
        echo 'org.gradle.jvmargs=-Xmx3072m' >> gradle.properties
        echo 'android.native.buildOutput=verbose' >> gradle.properties
        ./gradlew buildAll --stacktrace

    - name: 上传调试版安装包
      uses: actions/upload-artifact@v4
      with:
        name: 调试版安装包
        path: out/debug/*

    - name: 上传正式版安装包
      uses: actions/upload-artifact@v4
      with:
        name: 正式版安装包
        path: out/release/*

    - name: 上传混淆映射日志
      uses: actions/upload-artifact@v4
      with:
        name: 混淆日志
        path: |
          patch-loader/build/outputs/mapping
          manager/build/outputs/mapping

    - name: 上传调试符号表
      uses: actions/upload-artifact@v4
      with:
        name: 符号表文件
        path: |
          patch-loader/build/symbols
