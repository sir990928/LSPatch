name: LSPatch自动编译

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build_task:
    name: 编译环境-${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    env:
      CCACHE_COMPILERCHECK: '%compiler% -dumpmachine; %compiler% -dumpversion'
      CCACHE_NOHASHDIR: 'true'
      CCACHE_HARDLINK: 'true'
      CCACHE_BASEDIR: '${{ github.workspace }}'

    steps:
    - name: 拉取项目源码
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: 写入签名密钥
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
      run: |
        if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
          echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
          echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
          echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
          echo androidStoreFile='key.jks' >> gradle.properties
          echo ${{ secrets.KEY_STORE }} | base64 --decode > key.jks
        fi

    - name: 拉取libxposed-api依赖
      uses: actions/checkout@v4
      with:
        repository: libxposed/api
        path: libxposed/api
        fetch-depth: 0

    - name: 拉取libxposed-service依赖
      uses: actions/checkout@v4
      with:
        repository: libxposed/service
        path: libxposed/service
        fetch-depth: 0

    - name: 配置Java17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle缓存与环境配置
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-home-cache-cleanup: false

    - name: Ccache编译加速
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: 2G
        key: ${{ runner.os }}
        restore-keys: ${{ runner.os }}
        save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

    - name: 发布libxposed-api到本地Maven
      working-directory: libxposed/api
      run: |
        echo "version=100" > gradle.properties
        # 1. 优先调用官方 publication Task
        ./gradlew :api:publishApiPublicationToMavenLocal -Pversion=100 --stacktrace || \
        ./gradlew publishToMavenLocal -Pversion=100 --stacktrace || \
        ./gradlew build -x test

        # 2. 如果 Gradle 未能在 ~/.m2 生成 api-100.pom，使用 mvn 进行兜底安装
        POM_PATH="$HOME/.m2/repository/io/github/libxposed/api/100/api-100.pom"
        if [ ! -f "$POM_PATH" ]; then
          TARGET_FILE=$(find . -type f \( -name "*.aar" -o -name "*.jar" \) ! -name "*-sources*" ! -name "*-javadoc*" | head -n 1)
          if [ -n "$TARGET_FILE" ]; then
            EXT="${TARGET_FILE##*.}"
            echo "找到依赖产物: $TARGET_FILE (类型: $EXT)"
            mvn install:install-file \
              -Dfile="$TARGET_FILE" \
              -DgroupId=io.github.libxposed \
              -DartifactId=api \
              -Dversion=100 \
              -Dpackaging="$EXT"
          else
            echo "警告: 未找到编译好的 jar/aar 产物"
          fi
        fi

        # 验证 Maven 仓库安装结果
        ls -la "$HOME/.m2/repository/io/github/libxposed/api/100/" || true

    - name: 发布libxposed-service到本地Maven
      working-directory: libxposed/service
      run: |
        ./gradlew :interface:publishInterfacePublicationToMavenLocal --stacktrace || \
        ./gradlew publishToMavenLocal --stacktrace || true

    - name: 执行全量打包编译
      run: |
        echo 'org.gradle.parallel=true' >> gradle.properties
        echo 'org.gradle.jvmargs=-Xmx3072m' >> gradle.properties
        echo 'android.native.buildOutput=verbose' >> gradle.properties
        ./gradlew buildAll --stacktrace

    - name: 上传调试版安装包
      uses: actions/upload-artifact@v4
      with:
        name: 调试版安装包
        path: out/debug/*

    - name: 上传正式版安装包
      uses: actions/upload-artifact@v4
      with:
        name: 正式版安装包
        path: out/release/*

    - name: 上传混淆映射日志
      uses: actions/upload-artifact@v4
      with:
        name: 混淆日志
        path: |
          patch-loader/build/outputs/mapping
          manager/build/outputs/mapping

    - name: 上传调试符号表
      uses: actions/upload-artifact@v4
      with:
        name: 符号表文件
        path: |
          patch-loader/build/symbols
